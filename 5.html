<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Guess Random Number</title>
    <link rel="stylesheet" href="5.css" />
  </head>
  <body>
    <div id="start-screen">
      <button id="start-btn">Start</button>
    </div>

    <div id="game-container" style="display: none">
      <h1>Guess Random Number</h1>
      <input type="number" id="guess-input" placeholder="Enter a number" />
      <br>
      <br>
      <button id="check-btn">Check Number</button>
      <p id="feedback"></p>
      <br>
      <br>
      <p id="attempts">ცდების რაოდენობა: 0</p>
      <button id="restart-btn" style="display: none">Start Again</button>
    </div>

    <script src="5.js"></script>
  </body>
</html>
